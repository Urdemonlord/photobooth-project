<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-labelledby="title desc">
  <title id="title">LAZA Photobooth Logo</title>
  <desc id="desc">Circular LAZA photobooth logo with photobooth illustration and tagline.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffd1b2"/>
      <stop offset="1" stop-color="#ffc39c"/>
    </linearGradient>
  </defs>
  <circle cx="256" cy="256" r="246" fill="#fff"/>
  <circle cx="256" cy="256" r="230" fill="url(#bg)"/>
  <circle cx="256" cy="256" r="215" fill="none" stroke="#fff" stroke-width="12" stroke-dasharray="2 18" stroke-linecap="round"/>

  <rect x="160" y="145" width="190" height="150" rx="16" fill="#fff" stroke="#1f3f5b" stroke-width="6"/>
  <rect x="150" y="120" width="210" height="40" rx="10" fill="#1f3f5b"/>
  <text x="255" y="146" fill="#fff" text-anchor="middle" font-size="24" font-family="Arial, sans-serif" font-weight="700">PHOTOBOOTH</text>

  <rect x="190" y="178" width="72" height="96" rx="8" fill="#ff8057"/>
  <line x1="214" y1="183" x2="214" y2="268" stroke="#b34e31" stroke-width="3"/>
  <line x1="238" y1="183" x2="238" y2="268" stroke="#b34e31" stroke-width="3"/>
  <circle cx="306" cy="185" r="18" fill="#e8f0f7" stroke="#1f3f5b" stroke-width="5"/>
  <circle cx="306" cy="185" r="7" fill="#1f3f5b"/>
  <rect x="286" y="220" width="40" height="26" rx="5" fill="#1f3f5b"/>

  <g transform="rotate(-12 130 220)">
    <rect x="95" y="175" width="48" height="92" rx="5" fill="#fff" stroke="#1f3f5b" stroke-width="4"/>
    <rect x="102" y="183" width="34" height="32" rx="4" fill="#2f7aa0"/>
    <rect x="102" y="221" width="34" height="39" rx="3" fill="#ffe6d6"/>
  </g>

  <text x="256" y="360" text-anchor="middle" fill="#1f3f5b" font-size="76" font-family="Arial, sans-serif" font-weight="800" letter-spacing="3">LAZA</text>
  <text x="256" y="396" text-anchor="middle" fill="#1f3f5b" font-size="46" font-family="Arial, sans-serif" font-weight="700" letter-spacing="4">PHOTOBOOTH</text>
  <text x="256" y="430" text-anchor="middle" fill="#b26746" font-size="24" font-family="cursive">Capture your best moments</text>
</svg>
